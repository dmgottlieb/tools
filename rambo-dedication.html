<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rambo III Dedication Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #ccc;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 28px;
      text-align: center;
      font-style: italic;
    }

    #canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 720px;
      background: #000;
      border: 1px solid #333;
      cursor: pointer;
    }

    #canvas-wrap canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .drop-hint {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      letter-spacing: 0.05em;
    }

    .controls {
      width: 100%;
      max-width: 720px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      display: block;
      margin-bottom: 5px;
    }

    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #eee;
      font-family: Georgia, serif;
      font-size: 1rem;
      line-height: 1.6;
      padding: 10px 14px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #555; }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > div { flex: 1; min-width: 120px; }

    input[type=range] {
      width: 100%;
      accent-color: #888;
    }

    input[type=color] {
      width: 44px;
      height: 28px;
      border: 1px solid #444;
      background: none;
      cursor: pointer;
      padding: 1px;
    }

    select {
      background: #111;
      border: 1px solid #333;
      color: #eee;
      font-size: 0.85rem;
      padding: 5px 8px;
      outline: none;
      width: 100%;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 11px 18px;
      border: 1px solid #444;
      background: #222;
      color: #ccc;
      font-family: Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    button:hover { background: #2e2e2e; border-color: #666; color: #fff; }

    #btn-download {
      background: #1c2b1c;
      border-color: #3a5c3a;
      color: #8fc48f;
    }
    #btn-download:hover { background: #243224; border-color: #5a8c5a; color: #aaddaa; }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-row input { flex: 1; }
    .range-val {
      width: 36px;
      text-align: right;
      font-size: 0.8rem;
      color: #666;
    }

    input[type=file] { display: none; }

    hr {
      border: none;
      border-top: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>

<h1>Rambo III Dedication Generator</h1>
<p class="subtitle">Recreate the famous hoax dedication card &mdash; with your own text</p>

<div id="canvas-wrap" title="Click or drag an image here to set background">
  <canvas id="c" width="1280" height="720"></canvas>
  <span class="drop-hint">click or drag image to replace background</span>
</div>

<div class="controls">

  <div>
    <label>Dedication Text</label>
    <textarea id="txt">THIS FILM IS DEDICATED
TO THE BRAVE MUJAHIDEEN FIGHTERS
OF AFGHANISTAN</textarea>
  </div>

  <hr>

  <div class="row">
    <div>
      <label>Font Size</label>
      <div class="range-row">
        <input type="range" id="fontSize" min="14" max="80" value="34">
        <span class="range-val" id="fontSizeVal">34</span>
      </div>
    </div>
    <div>
      <label>Vertical Position</label>
      <div class="range-row">
        <input type="range" id="yPos" min="0" max="100" value="50">
        <span class="range-val" id="yPosVal">50%</span>
      </div>
    </div>
  </div>

  <div class="row">
    <div>
      <label>Text Color</label>
      <input type="color" id="textColor" value="#ffffff">
    </div>
    <div>
      <label>Overlay Darkness</label>
      <div class="range-row">
        <input type="range" id="overlay" min="0" max="90" value="15">
        <span class="range-val" id="overlayVal">15%</span>
      </div>
    </div>
    <div>
      <label>Letter Spacing</label>
      <div class="range-row">
        <input type="range" id="letterSpacing" min="-2" max="12" value="2" step="0.5">
        <span class="range-val" id="letterSpacingVal">2</span>
      </div>
    </div>
  </div>

  <div class="row">
    <div>
      <label>Glow / Shadow</label>
      <div class="range-row">
        <input type="range" id="shadowBlur" min="0" max="20" value="6">
        <span class="range-val" id="shadowBlurVal">3</span>
      </div>
    </div>
    <div>
      <label>Font</label>
      <select id="fontFamily">
        <option value="Helvetica, Arial, sans-serif" selected>Helvetica / Arial (default)</option>
        <option value="'Arial Narrow', Arial, sans-serif">Arial Narrow</option>
        <option value="Futura, 'Century Gothic', sans-serif">Futura / Century Gothic</option>
        <option value="'Times New Roman', Times, serif">Times New Roman</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Palatino, 'Palatino Linotype', serif">Palatino</option>
      </select>
    </div>
    <div>
      <label>Case</label>
      <select id="textCase">
        <option value="upper" selected>ALL CAPS</option>
        <option value="normal">As typed</option>
      </select>
    </div>
  </div>

  <div class="btn-row">
    <button id="btn-upload">&#128444; Upload Background Image</button>
    <input type="file" id="fileInput" accept="image/*">
    <button id="btn-download">&#8615; Download Image</button>
  </div>

</div>

  let bgImage = null;

  // Load the default background on startup
  const defaultImg = new Image();
  defaultImg.onload = () => { bgImage = defaultImg; draw(); };
  defaultImg.src = DEFAULT_BG;

  // ── Controls ──────────────────────────────────────────────
  const txtEl        = document.getElementById('txt');
  const fontSizeEl   = document.getElementById('fontSize');
  const yPosEl       = document.getElementById('yPos');
  const textColorEl  = document.getElementById('textColor');
  const overlayEl    = document.getElementById('overlay');
  const lsEl         = document.getElementById('letterSpacing');
  const shadowBlurEl = document.getElementById('shadowBlur');
  const fontFamilyEl = document.getElementById('fontFamily');
  const textCaseEl   = document.getElementById('textCase');

  function syncLabels() {
    document.getElementById('fontSizeVal').textContent       = fontSizeEl.value;
    document.getElementById('yPosVal').textContent           = yPosEl.value + '%';
    document.getElementById('overlayVal').textContent        = overlayEl.value + '%';
    document.getElementById('letterSpacingVal').textContent  = lsEl.value;
    document.getElementById('shadowBlurVal').textContent     = shadowBlurEl.value;
  }

  // ── Text helpers ───────────────────────────────────────────
  function drawTextWithLetterSpacing(ctx, text, x, y, letterSpacing) {
    if (letterSpacing === 0) {
      ctx.fillText(text, x, y);
      return;
    }
    const chars = [...text];
    const widths = chars.map(ch => ctx.measureText(ch).width);
    let totalWidth = widths.reduce((a, b) => a + b, 0) + letterSpacing * (chars.length - 1);

    let cx = x - totalWidth / 2;
    chars.forEach((ch, i) => {
      ctx.fillText(ch, cx + widths[i] / 2, y);
      cx += widths[i] + letterSpacing;
    });
  }

  function measureWithSpacing(ctx, text, letterSpacing) {
    const chars = [...text];
    let w = chars.reduce((a, ch) => a + ctx.measureText(ch).width, 0);
    w += letterSpacing * (chars.length - 1);
    return w;
  }

  function wrapText(ctx, text, maxWidth, letterSpacing) {
    const words = text.split(' ');
    const lines = [];
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (measureWithSpacing(ctx, test, letterSpacing) > maxWidth && current) {
        lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  // ── Draw ──────────────────────────────────────────────────
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    if (bgImage) {
      const scale = Math.max(W / bgImage.width, H / bgImage.height);
      const sw = bgImage.width * scale;
      const sh = bgImage.height * scale;
      ctx.drawImage(bgImage, (W - sw) / 2, (H - sh) / 2, sw, sh);
    } else {
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, W, H);
    }

    // Dark overlay
    const alpha = parseInt(overlayEl.value) / 100;
    if (alpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Text settings
    const fontSize      = parseInt(fontSizeEl.value);
    const yPct          = parseInt(yPosEl.value) / 100;
    const color         = textColorEl.value;
    const letterSpacing = parseFloat(lsEl.value);
    const shadowBlur    = parseInt(shadowBlurEl.value);
    const family        = fontFamilyEl.value;
    const useUpper      = textCaseEl.value === 'upper';
    const rawText       = txtEl.value.trim();

    ctx.font         = `${fontSize}px ${family}`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    const maxWidth = W * 0.75;
    const paragraphs = rawText.split('\n');
    let allLines = [];
    for (const para of paragraphs) {
      const p = useUpper ? para.toUpperCase() : para;
      if (p.trim() === '') {
        allLines.push('');
      } else {
        allLines = allLines.concat(wrapText(ctx, p, maxWidth, letterSpacing));
      }
    }

    const lineHeight = fontSize * 1.6;
    const totalTextH = allLines.length * lineHeight;
    const centerY    = H * yPct;
    const startY     = centerY - totalTextH / 2 + lineHeight / 2;

    function renderLines(drawFn) {
      allLines.forEach((line, i) => {
        if (!line.trim()) return;
        drawFn(line, W / 2, startY + i * lineHeight);
      });
    }

    // ── Optical-film halation effect (3-pass) ─────────────────
    // Pass 1: wide soft white glow — mimics optical title bloom
    ctx.fillStyle     = 'rgba(255,255,255,0.18)';
    ctx.shadowColor   = 'rgba(255,255,255,0.35)';
    ctx.shadowBlur    = shadowBlur * 3.5;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    renderLines((t, x, y) => drawTextWithLetterSpacing(ctx, t, x, y, letterSpacing));

    // Pass 2: tight dark edge for legibility over bright backgrounds
    ctx.fillStyle     = color;
    ctx.shadowColor   = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur    = shadowBlur * 1.2;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    renderLines((t, x, y) => drawTextWithLetterSpacing(ctx, t, x, y, letterSpacing));

    // Pass 3: crisp white text on top — the solid core
    ctx.fillStyle     = color;
    ctx.shadowColor   = 'transparent';
    ctx.shadowBlur    = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    renderLines((t, x, y) => drawTextWithLetterSpacing(ctx, t, x, y, letterSpacing));
  }

  // ── Load background image ─────────────────────────────────
  function loadImageFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => { bgImage = img; draw(); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('btn-upload').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadImageFile(e.target.files[0]);
  });

  const wrap = document.getElementById('canvas-wrap');
  wrap.addEventListener('dragover', e => { e.preventDefault(); wrap.style.outline = '2px solid #666'; });
  wrap.addEventListener('dragleave', () => { wrap.style.outline = ''; });
  wrap.addEventListener('drop', e => {
    e.preventDefault();
    wrap.style.outline = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImageFile(file);
  });
  wrap.addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  // ── Download ──────────────────────────────────────────────
  document.getElementById('btn-download').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'dedication.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // ── Live updates ──────────────────────────────────────────
  [txtEl, fontSizeEl, yPosEl, textColorEl, overlayEl, lsEl, shadowBlurEl, fontFamilyEl, textCaseEl].forEach(el => {
    el.addEventListener('input', () => { syncLabels(); draw(); });
    el.addEventListener('change', () => { syncLabels(); draw(); });
  });

  syncLabels();
</script>
